<div class="kicker">Why it is true</div>
<h2>It is really about areas</h2>
<ul>
<li>Build a <span class="green">square</span> outward on each side</li>
<li>The leg squares have areas <span class="green">a²</span> and <span class="amber">b²</span></li>
<li>The hypotenuse square has area <span class="violet">c²</span></li>
</ul>
<div class="callout"><span class="label">The big idea</span>
The two smaller squares together hold exactly the same area as the big one.</div>
