<div class="kicker">The statement</div>
<h2>The Pythagorean Theorem</h2>
<ul>
<li>Holds only for a <span class="cyan">right</span> triangle — one ninety-degree angle</li>
<li>The two shorter sides are the <span class="green">legs</span>: a and b</li>
<li>The longest side, opposite the right angle, is the <span class="amber">hypotenuse</span>: c</li>
</ul>
<div class="formula">a² + b² = c²</div>
<footer><span>One equation, three sides</span><span>§1.1</span></footer>
